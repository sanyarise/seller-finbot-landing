<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Growth chart line -->
  <polyline points="100,480 250,420 400,450 550,360 700,380 850,280 950,220 1100,150"
    stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Chart area fill -->
  <polygon points="100,480 250,420 400,450 550,360 700,380 850,280 950,220 1100,150 1100,530 100,530"
    fill="#22C55E" opacity="0.08"/>
  <!-- Chart dot -->
  <circle cx="1100" cy="150" r="8" fill="#22C55E" opacity="0.8"/>

  <!-- Emoji icon -->
  <text x="100" y="200" font-size="64" font-family="sans-serif">💹</text>

  <!-- Main title -->
  <text x="100" y="295" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Seller FinBot</text>

  <!-- Subtitle -->
  <text x="100" y="360" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">Реальная прибыль на WB и Ozon</text>

  <!-- Features -->
  <text x="100" y="440" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="500" fill="#64748B">Алерты на комиссии · Юнит-экономика · ABC-анализ · Налоговый калькулятор</text>

  <!-- Marketplace badges -->
  <rect x="100" y="480" width="120" height="40" rx="8" fill="#7B2FF2" opacity="0.9"/>
  <text x="160" y="507" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">WB</text>

  <rect x="240" y="480" width="120" height="40" rx="8" fill="#005BFF" opacity="0.9"/>
  <text x="300" y="507" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Ozon</text>

  <rect x="380" y="480" width="160" height="40" rx="8" fill="#229ED9" opacity="0.9"/>
  <text x="460" y="507" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Telegram</text>

  <!-- URL -->
  <text x="1100" y="590" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="500" fill="#475569" text-anchor="end">seller-finbot.ru</text>
</svg>
